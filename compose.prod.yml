services:
  php:
    # prod: code được build sẵn trong image (không mount volume)
    volumes:
      - ./docker/php/conf.d/custom.ini:/usr/local/etc/php/conf.d/custom.ini

  nginx:
    volumes:
      - ./sylius/public:/srv/sylius/public:ro
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs-data:/etc/letsencrypt
    environment:
      - VIRTUAL_HOST=yourdomain.com
      - LETSENCRYPT_HOST=yourdomain.com
      - LETSENCRYPT_EMAIL=admin@yourdomain.com

  certbot:
    image: certbot/certbot
    volumes:
      - ./docker/nginx/certs-data:/etc/letsencrypt
      - ./docker/nginx/certs-data:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
