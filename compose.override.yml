services:
  php:
    volumes:
      - ./sylius:/srv/sylius:cached
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      APP_ENV: dev
    env_file:
      - .env

  nginx:
    ports:
      - "80:80"

  mailhog:
    image: mailhog/mailhog
    container_name: sylius-mailhog
    ports:
      - "8025:8025"
