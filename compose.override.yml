services:
  php:
    volumes:
      - ./sylius:/srv/sylius:cached

  nginx:
    volumes:
      - ./sylius/public:/srv/sylius/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs/dev.crt:/etc/nginx/certs/dev.crt:ro
      - ./docker/nginx/certs/dev.key:/etc/nginx/certs/dev.key:ro

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
